<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="bmstable" content="header.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Difficulty Table</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <span id="page-title">Difficulty Table</span>
  </div>

  <div class="subbar">
    <span id="page-subtitle"></span>
  </div>

  <div class="container">
    <div class="note-box" id="description-box"></div>

    <div class="toolbar">
      <input type="text" id="search-input" placeholder="Search by title or artist...">

      <div class="multi-select" id="level-filter-wrap">
        <button type="button" id="level-filter-button" class="multi-select-button">
          All
        </button>
        <div id="level-filter-panel" class="multi-select-panel hidden">
          <div class="multi-select-actions">
            <button type="button" id="select-all-levels">Select All</button>
            <button type="button" id="clear-levels">Clear</button>
          </div>
          <div id="level-filter-options" class="multi-select-options"></div>
        </div>
      </div>

      <select id="display-field-1">
        <option value="type">Type</option>
        <option value="sunny_sr">Sunny SR</option>
        <option value="bms_difficulty">BMS Difficulty</option>
        <option value="dan_estimate">Dan Estimate</option>
        <option value="patterns">Patterns</option>
      </select>

      <select id="display-field-2">
        <option value="type">Type</option>
        <option value="sunny_sr">Sunny SR</option>
        <option value="bms_difficulty">BMS Difficulty</option>
        <option value="dan_estimate">Dan Estimate</option>
        <option value="patterns">Patterns</option>
      </select>

      <button id="clear-button">Clear</button>
    </div>

    <div class="meta" id="meta"></div>
    <div id="content"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
